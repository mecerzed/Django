<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}My Tasks{% endblock %}</title>
    <style>
        :root {
            --bg:           #0b0f19;
            --bg-elevated:  #111827;
            --bg-card:      #1a2440;
            --bg-input:     #1e2d4a;
            --bg-pill:      #1e2d4a;
            --lime:         #c8f55a;
            --lime-dim:     #a3d936;
            --cyan:         #22d4ff;
            --lavender:     #c4b5fd;
            --amber:        #fbbf24;
            --blue:         #3b82f6;
            --text:         #f8fafc;
            --text-secondary:#94a3b8;
            --text-muted:   #64748b;
            --text-dim:     #334155;
            --danger:       #ef4444;
            --danger-soft:  rgba(239,68,68,0.12);
            --success:      #22c55e;
            --radius-xs:    8px;
            --radius-sm:    12px;
            --radius-md:    16px;
            --radius-lg:    20px;
            --radius-xl:    24px;
            --radius-pill:  999px;
            --font:         -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            --shadow-sm:    0 1px 2px rgba(0,0,0,0.3);
            --shadow-md:    0 4px 12px rgba(0,0,0,0.4);
            --shadow-lg:    0 8px 30px rgba(0,0,0,0.5);
            --shadow-lime:  0 4px 20px rgba(200,245,90,0.15);
        }

        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: var(--font);
            background: var(--bg);
            min-height: 100vh;
            color: var(--text);
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .app-shell {
            width: 100%;
            min-height: 100vh;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-x: hidden;
        }

        .top-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px 12px;
            max-width: 720px;
            margin: 0 auto;
            width: 100%;
            position: sticky;
            top: 0;
            z-index: 50;
            background: linear-gradient(to bottom, var(--bg) 80%, transparent);
        }

        .nav-icon-btn {
            width: 40px; height: 40px;
            border-radius: var(--radius-md);
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            text-decoration: none;
            color: var(--text-secondary);
            transition: all 0.2s cubic-bezier(0.22,1,0.36,1);
        }

        .nav-icon-btn:hover { 
            background: #253352; 
            color: var(--text);
            transform: translateY(-1px);
        }

        .nav-icon-btn:active { transform: scale(0.95); }

        .nav-icon-btn svg {
            width: 18px; height: 18px;
            stroke: currentColor; stroke-width: 2; fill: none;
        }

        .nav-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.01em;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 28px;
            border-radius: var(--radius-pill);
            text-decoration: none;
            border: none;
            cursor: pointer;
            font-family: var(--font);
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            transition: all 0.25s cubic-bezier(0.22,1,0.36,1);
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(255,255,255,0.1), transparent);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .btn:hover::after { opacity: 1; }
        .btn:hover  { transform: translateY(-2px); }
        .btn:active { transform: translateY(0) scale(0.98); }

        .btn svg {
            width: 18px; height: 18px;
            stroke: currentColor; stroke-width: 2.2; fill: none;
            flex-shrink: 0;
        }

        .btn-lime {
            background: var(--lime);
            color: #0f172a;
            box-shadow: var(--shadow-lime);
        }

        .btn-lime:hover { box-shadow: 0 6px 24px rgba(200,245,90,0.25); }

        .btn-primary {
            background: var(--blue);
            color: #fff;
            box-shadow: 0 4px 16px rgba(59,130,246,0.3);
        }

        .btn-danger {
            background: var(--danger);
            color: #fff;
            box-shadow: 0 4px 16px rgba(239,68,68,0.25);
        }

        .btn-ghost {
            background: transparent;
            color: var(--text-secondary);
            border: 1.5px solid rgba(255,255,255,0.08);
        }

        .btn-ghost:hover { 
            border-color: rgba(255,255,255,0.15); 
            color: var(--text);
            background: rgba(255,255,255,0.03);
        }

        .field-wrap { margin-bottom: 20px; }

        .field-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 8px;
        }

        .field-input,
        input[type="text"],
        input[type="email"],
        textarea,
        select {
            width: 100%;
            padding: 14px 18px;
            background: var(--bg-input);
            border: 1.5px solid rgba(255,255,255,0.06);
            border-radius: var(--radius-md);
            font-family: var(--font);
            font-size: 0.95rem;
            color: var(--text);
            transition: all 0.2s cubic-bezier(0.22,1,0.36,1);
            outline: none;
        }

        .field-input::placeholder,
        input::placeholder,
        textarea::placeholder {
            color: var(--text-dim);
        }

        .field-input:focus,
        input[type="text"]:focus,
        textarea:focus,
        select:focus {
            border-color: var(--lime);
            box-shadow: 0 0 0 4px rgba(200,245,90,0.08), 0 0 0 1px rgba(200,245,90,0.2);
        }

        textarea {
            min-height: 120px;
            resize: vertical;
            line-height: 1.6;
        }

        .quote-strip {
            margin: 0 auto 24px;
            padding: 16px 20px;
            background: rgba(200,245,90,0.05);
            border: 1px solid rgba(200,245,90,0.08);
            border-left: 3px solid var(--lime);
            border-radius: var(--radius-md);
            max-width: 720px;
            width: calc(100% - 48px);
            position: relative;
        }

        .quote-strip::before {
            content: '"';
            position: absolute;
            top: -8px;
            left: 14px;
            font-size: 2.5rem;
            color: var(--lime);
            opacity: 0.3;
            font-family: Georgia, serif;
            line-height: 1;
        }

        .quote-strip .q-text {
            font-size: 0.85rem;
            font-style: italic;
            color: var(--text-secondary);
            line-height: 1.6;
            padding-left: 8px;
        }

        .quote-strip .q-author {
            font-size: 0.7rem;
            color: var(--lime-dim);
            margin-top: 8px;
            padding-left: 8px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-weight: 600;
        }

        .scroll-content {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 40px;
        }

        @keyframes fadeUp {
            from { opacity:0; transform:translateY(16px); }
            to   { opacity:1; transform:translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity:0; }
            to   { opacity:1; }
        }

        @keyframes scaleIn {
            from { opacity:0; transform:scale(0.95); }
            to   { opacity:1; transform:scale(1); }
        }

        .anim { animation: fadeUp 0.5s cubic-bezier(0.22,1,0.36,1) both; }
        .anim-d1 { animation-delay: 0.04s; }
        .anim-d2 { animation-delay: 0.1s; }
        .anim-d3 { animation-delay: 0.16s; }
        .anim-d4 { animation-delay: 0.22s; }
        .anim-d5 { animation-delay: 0.28s; }

        input[type="checkbox"] {
            accent-color: var(--lime);
            width: 18px; height: 18px;
            cursor: pointer;
        }

        .divider {
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.06), transparent);
            margin: 24px 0;
        }

    </style>
     {% block extra_css %}{% endblock %}
<base target="_blank">
</head>
<body>
<div class="app-shell">

    {% block content %}{% endblock %}

</div>

<script>
    function getUser() { return localStorage.getItem('focus_username') || ''; }
    function setUser(name) { localStorage.setItem('focus_username', name); }

    document.querySelectorAll('.username-display').forEach(el => {
        const u = getUser();
        if (u) el.textContent = u;
    });
</script>

{% block extra_js %}{% endblock %}
</body>
</html>
